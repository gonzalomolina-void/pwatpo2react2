<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="nexus-grad-h" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background Shield -->
  <rect width="48" height="48" rx="12" fill="#0f172a"/>
  <!-- The Nexus Hexagon -->
  <path d="M24 4L42 14.5V33.5L24 44L6 33.5V14.5L24 4Z" fill="url(#nexus-grad-h)" fill-opacity="0.1" stroke="url(#nexus-grad-h)" stroke-width="1.5"/>
